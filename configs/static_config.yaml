config_vars: configs/config_vars.yaml

components_manager:
  task_processors:
    main-task-processor:
      worker_threads: $worker-threads
    fs-task-processor:
      worker_threads: $worker-fs-threads
    db-task-processor:
      worker_threads: $worker-db-threads

  default_task_processor: main-task-processor

  components:
    default-server-middleware-pipeline-builder:
      append:
        - auth-middleware

    server:
      listener:
        port: $server-port
        task_processor: main-task-processor

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: $logger-level
          overflow_behavior: discard

    dynamic-config:
      defaults:
        HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000

    testsuite-support: {}

    congestion-control: {}

    http-client: {}

    http-client-core:
      load-enabled: true
      fs-task-processor: fs-task-processor

    dns-client:
      fs-task-processor: fs-task-processor

    tests-control:
      load-enabled: $is-testing
      path: /tests/{action}
      method: POST
      task_processor: main-task-processor

    handler-ping:
      path: /ping
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    postgres-db:
      dbconnection: $dbconnection
      blocking_task_processor: db-task-processor
      dns_resolver: async
      sync-start: true

    mongo-db:
      dbconnection: $mongo-connection
      dns_resolver: async

    taxi-storage: {}

    handler-users-create:
      path: /users
      method: POST
      task_processor: main-task-processor

    handler-users-get:
      path: /users
      method: GET
      task_processor: main-task-processor

    handler-auth-login:
      path: /auth/login
      method: POST
      task_processor: main-task-processor

    handler-drivers-create:
      path: /drivers
      method: POST
      task_processor: main-task-processor

    handler-rides-create:
      path: /rides
      method: POST
      task_processor: main-task-processor

    handler-rides-get:
      path: /rides
      method: GET
      task_processor: main-task-processor

    handler-rides-accept:
      path: /rides/{id}/accept
      method: PATCH
      task_processor: main-task-processor

    handler-rides-complete:
      path: /rides/{id}/complete
      method: PATCH
      task_processor: main-task-processor

    handler-mongo-users-create:
      path: /mongo/users
      method: POST
      task_processor: main-task-processor

    handler-mongo-users-get:
      path: /mongo/users
      method: GET
      task_processor: main-task-processor

    auth-middleware: {}
