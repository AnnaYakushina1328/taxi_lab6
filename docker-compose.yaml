services:
  postgres:
    image: postgres:16
    container_name: taxi-postgres
    environment:
      POSTGRES_DB: taxi
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: taxi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' localhost:27017/test | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: taxi-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: taxi
      RABBITMQ_DEFAULT_PASS: taxi123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  taxi-service:
    build:
      context: .
      dockerfile: Dockerfile
    security_opt:
      - seccomp=unconfined
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taxi
      DB_USER: taxi
      DB_PASSWORD: taxi123
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: taxi_mongo_db
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  event-consumer:
    build:
      context: ./event_service
      dockerfile: Dockerfile
    container_name: taxi-event-consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: taxi
      RABBITMQ_PASSWORD: taxi123
      READ_MODEL_PATH: /data/read_model.json
    volumes:
      - event-data:/data
    command: ["python", "consumer.py"]

  event-producer:
    build:
      context: ./event_service
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: taxi
      RABBITMQ_PASSWORD: taxi123
    command: ["python", "test_events.py"]
    profiles:
      - tools

volumes:
  postgres-data:
  mongo-data:
  event-data:
