openapi: 3.0.3
info:
  title: Taxi Service API
  version: 1.1.0
  description: >
    REST API for taxi ordering system built with Yandex userver.
    The project uses PostgreSQL for the original relational part
    and MongoDB for the document-oriented part of lab 04.

servers:
  - url: http://127.0.0.1:8080

tags:
  - name: Users
  - name: Auth
  - name: Drivers
  - name: Rides
  - name: Mongo Users

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token

  schemas:
    UserCreateRequest:
      type: object
      required:
        - login
        - password
        - full_name
      properties:
        login:
          type: string
        password:
          type: string
        full_name:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        full_name:
          type: string

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string

    DriverCreateRequest:
      type: object
      required:
        - user_id
        - car_model
        - car_number
        - license_number
      properties:
        user_id:
          type: integer
        car_model:
          type: string
        car_number:
          type: string
        license_number:
          type: string

    DriverResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        car_model:
          type: string
        car_number:
          type: string
        license_number:
          type: string
        status:
          type: string

    RideCreateRequest:
      type: object
      required:
        - passenger_id
        - pickup_address
        - destination_address
      properties:
        passenger_id:
          type: integer
        pickup_address:
          type: string
        destination_address:
          type: string

    RideAcceptRequest:
      type: object
      required:
        - driver_id
      properties:
        driver_id:
          type: integer

    RideResponse:
      type: object
      properties:
        id:
          type: integer
        passenger_id:
          type: integer
        driver_id:
          type: integer
        pickup_address:
          type: string
        destination_address:
          type: string
        status:
          type: string

    MongoUserCreateRequest:
      type: object
      required:
        - login
        - password
        - first_name
        - last_name
      properties:
        login:
          type: string
          example: mongo.api.user
        password:
          type: string
          example: pass1234
        first_name:
          type: string
          example: Anna
        last_name:
          type: string
          example: Yakushina
        status:
          type: string
          enum: [active, blocked]
          example: active
        email:
          type: string
          example: mongo.api.user@example.com
        phone:
          type: string
          example: "+79990000000"

    MongoUserResponse:
      type: object
      properties:
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        status:
          type: string
        profile:
          type: object
          properties:
            email:
              type: string
            phone:
              type: string
        source:
          type: string
          example: mongo

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  /users:
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Users]
      summary: Find user by login or name mask
      parameters:
        - in: query
          name: login
          schema:
            type: string
        - in: query
          name: name_mask
          schema:
            type: string
      responses:
        '200':
          description: User or users found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserResponse'
                  - type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
        '400':
          description: Missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /drivers:
    post:
      tags: [Drivers]
      summary: Register driver
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverCreateRequest'
      responses:
        '201':
          description: Driver created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Driver cannot be created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rides:
    post:
      tags: [Rides]
      summary: Create ride
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideCreateRequest'
      responses:
        '201':
          description: Ride created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ride cannot be created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Rides]
      summary: Get active rides or user ride history
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [active]
      responses:
        '200':
          description: List of rides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RideResponse'
        '400':
          description: Missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rides/{id}/accept:
    patch:
      tags: [Rides]
      summary: Accept ride by driver
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideAcceptRequest'
      responses:
        '200':
          description: Ride accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ride cannot be accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rides/{id}/complete:
    patch:
      tags: [Rides]
      summary: Complete ride
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ride completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Ride cannot be completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /mongo/users:
    post:
      tags: [Mongo Users]
      summary: Create user in MongoDB
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MongoUserCreateRequest'
      responses:
        '201':
          description: Mongo user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MongoUserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists in MongoDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Mongo Users]
      summary: Find Mongo user by login or name mask
      parameters:
        - in: query
          name: login
          schema:
            type: string
          description: Exact login lookup
        - in: query
          name: name_mask
          schema:
            type: string
          description: Case-insensitive substring search in first_name or last_name
      responses:
        '200':
          description: Mongo user or users found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MongoUserResponse'
                  - type: array
                    items:
                      $ref: '#/components/schemas/MongoUserResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Mongo user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
